name: Renovate Auto-Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}

jobs:
  # Patch updates: auto-merge immediately, no Claude needed
  auto-merge-patch:
    if: |
      (github.actor == 'renovate[bot]' || github.event_name == 'workflow_dispatch') &&
      contains(github.event.pull_request.labels.*.name, 'patch')
    runs-on: ubuntu-latest
    steps:
      - name: Auto-merge patch update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ env.PR_NUMBER }} \
            --squash \
            --auto \
            --repo ${{ github.repository }}

  # Minor and major updates: Claude reviews and fixes if needed
  auto-review:
    if: |
      (github.actor == 'renovate[bot]' || github.event_name == 'workflow_dispatch') &&
      !contains(github.event.pull_request.labels.*.name, 'patch')
    runs-on: ubuntu-latest
    steps:
      - name: Get PR info
        id: pr-info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr view ${{ env.PR_NUMBER }} --repo ${{ github.repository }} --json headRefName,baseRefName,title,labels)
          HEAD=$(echo "$PR" | jq -r '.headRefName')
          BASE=$(echo "$PR" | jq -r '.baseRefName')
          TITLE=$(echo "$PR" | jq -r '.title')
          LABELS=$(echo "$PR" | jq -r '.labels[].name' | tr '\n' ',')
          echo "head=$HEAD" >> $GITHUB_OUTPUT
          echo "base=$BASE" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "labels=$LABELS" >> $GITHUB_OUTPUT
          echo "PR: #${{ env.PR_NUMBER }} $TITLE (labels: $LABELS)"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-info.outputs.head }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get PR diff
        id: diff
        run: |
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          git diff origin/${{ steps.pr-info.outputs.base }}...HEAD >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Claude review and fix
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          timeout_minutes: 15
          allowed_bots: renovate
          model: claude-sonnet-4-6
          direct_prompt: |
            You are reviewing a Renovate dependency update PR for a GitOps Kubernetes homelab repository.

            ## PR Info
            - Title: ${{ steps.pr-info.outputs.title }}
            - Labels: ${{ steps.pr-info.outputs.labels }}

            ## Diff
            ```
            ${{ steps.diff.outputs.diff }}
            ```

            ## Your task

            1. **Analyze the update**: Identify what is being updated (app name, old version → new version).

            2. **Check for breaking changes**: Look up the changelog/release notes for this version bump. Pay attention to:
               - Renamed config keys or values
               - Removed fields
               - Changed defaults that could affect this repo's configuration
               - API version changes for CRDs

            3. **Check our config**: Look at the relevant values files, kustomization.yaml, or deployment manifests in this repo to see if we use any of the breaking change patterns.

            4. **Fix if needed**: If there are breaking changes that affect our config, make the necessary edits to the relevant files in the repo RIGHT NOW. Commit the changes with a clear message explaining what you changed and why.

            5. **Report**: Output a brief summary:
               - What was updated
               - Whether breaking changes exist and if they affect us
               - What fixes you made (if any)
               - Whether it's safe to merge

            ## Context about this repo
            - GitOps repo for a k3s homelab cluster managed by ArgoCD
            - Apps defined under `apps/` and `core/` as ArgoCD Application manifests
            - Helm values are in `apps/<name>/values.yaml` or inline `valuesObject` in the Application yaml
            - Kustomize apps are under `apps/<name>/` or `core/<name>/`
            - Common breaking change patterns to watch for: renamed helm values keys, changed image tag formats, new required fields, CRD version bumps

            If the update is safe (or you've already fixed any issues), end your response with exactly:
            MERGE_APPROVED

            If there is something you cannot fix automatically that requires human attention, end with:
            NEEDS_HUMAN_REVIEW: <brief reason>

      - name: Merge if approved
        if: contains(steps.claude.outputs.response, 'MERGE_APPROVED')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ env.PR_NUMBER }} \
            --squash \
            --auto \
            --repo ${{ github.repository }}

      - name: Comment if needs review
        if: contains(steps.claude.outputs.response, 'NEEDS_HUMAN_REVIEW')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ env.PR_NUMBER }} \
            --repo ${{ github.repository }} \
            --body "🤖 **Claude review**: This PR needs human attention before merging.

            ${{ steps.claude.outputs.response }}"
