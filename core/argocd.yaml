apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  destination:
    namespace: argocd
    name: in-cluster
  project: core-components
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
    - path: core/argo-assets
      repoURL: https://github.com/patrickjmcd/k8s-argo.git
      targetRevision: main
    - path: argo/projects
      repoURL: https://github.com/patrickjmcd/k8s-argo.git
      targetRevision: main
      directory:
        recurse: false
    - chart: argo-cd
      repoURL: https://argoproj.github.io/argo-helm
      targetRevision: 10.2.1
      helm:
        releaseName: argocd
        valuesObject:
          # Keep existing secrets (OIDC client secret, admin password, etc.)
          configs:
            secret:
              createSecret: false
            cm:
              url: https://argo.x.pmcd.io
              oidc.config: |
                name: PocketID
                issuer: https://auth.pmcd.dev
                clientID: a9bf2324-b65d-4bb2-8b11-5d7d7ddbf8db
                clientSecret: $oidc.pocketID.clientSecret
                enablePKCEAuthentication: true
                scopes:
                  - openid
                  - profile
                  - email
                  - groups
              resource.customizations.ignoreDifferences.argoproj.io_Application: |
                jsonPointers:
                  - /metadata/finalizers
              # Ignore tolerations injected by Kyverno's node-failure-tolerations policy.
              # This policy mutates pod specs (and pod controller templates) to add 30s
              # eviction tolerations for not-ready/unreachable nodes. ArgoCD's selfHeal
              # would otherwise fight Kyverno in an infinite loop.
              resource.customizations.ignoreDifferences.apps_Deployment: |
                jqPathExpressions:
                  - '.spec.template.spec.tolerations[]? | select(.key == "node.kubernetes.io/not-ready" or .key == "node.kubernetes.io/unreachable")'
              resource.customizations.ignoreDifferences.apps_DaemonSet: |
                jqPathExpressions:
                  - '.spec.template.spec.tolerations[]? | select(.key == "node.kubernetes.io/not-ready" or .key == "node.kubernetes.io/unreachable" or .key == "node-role.kubernetes.io/master" or .key == "node-role.kubernetes.io/control-plane")'
              # HTTPRoute backendRefs get group:"" and weight:1 defaulted by the API server.
              resource.customizations.ignoreDifferences.gateway.networking.k8s.io_HTTPRoute: |
                jqPathExpressions:
                  - '.spec.rules[].backendRefs[]?.group'
                  - '.spec.rules[].backendRefs[]?.weight'
              resource.customizations.ignoreDifferences.apps_StatefulSet: |
                jqPathExpressions:
                  - '.spec.template.spec.tolerations[]? | select(.key == "node.kubernetes.io/not-ready" or .key == "node.kubernetes.io/unreachable")'
              # Only exclude core Endpoints (auto-managed by kube-controller); allow
              # EndpointSlice so manually-created slices for external services sync normally.
              resource.exclusions: |
                - apiGroups:
                  - ""
                  kinds:
                  - Endpoints
                  clusters:
                  - "*"
            rbac:
              policy.csv: |
                g, argocd_admin, role:admin
            params:
              server.insecure: true

          server:
            # Autoscaling with floors of 1: the default 50% memory target can
            # never scale down (per-pod baseline is ~50% of request regardless
            # of load), so it ratcheted to max and stayed. CPU-led targets
            # react to real load only.
            autoscaling:
              enabled: true
              minReplicas: 1
              maxReplicas: 3
              targetCPUUtilizationPercentage: 70
              targetMemoryUtilizationPercentage: 90
            resources:
              requests:
                cpu: 15m
                # VPA target ~105Mi; kept well above it so the 90% memory HPA
                # threshold stays far from idle baseline
                memory: 192Mi
              limits:
                cpu: 200m
                memory: 512Mi

          controller:
            # Sharding only helps with multiple destination clusters; the second
            # replica sat idle.
            replicas: 1
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: kubernetes.io/hostname
                          operator: NotIn
                          values:
                            - jetson-nano-kube0
            # VPA target: 671m / ~1.75Gi — the controller does all reconciliation
            # and was requesting half its real usage.
            resources:
              requests:
                cpu: 500m
                memory: 1792Mi
              limits:
                memory: 4Gi

          repoServer:
            autoscaling:
              enabled: true
              minReplicas: 1
              maxReplicas: 5
              targetCPUUtilizationPercentage: 70
              targetMemoryUtilizationPercentage: 90
            livenessProbe:
              timeoutSeconds: 10
            readinessProbe:
              timeoutSeconds: 10
            resources:
              requests:
                cpu: 100m
                memory: 200Mi
              limits:
                cpu: 500m
                memory: 512Mi

          redis:
            resources:
              requests:
                cpu: 23m
                memory: 100Mi
              limits:
                memory: 100Mi

          applicationSet:
            # Leader-elected; the second replica only watches.
            replicas: 1
            resources:
              requests:
                cpu: 23m
                memory: 128Mi
              limits:
                cpu: 100m
                memory: 256Mi

          notifications:
            resources:
              requests:
                cpu: 15m
                memory: 100Mi
              limits:
                cpu: 100m
                memory: 200Mi

          dex:
            enabled: false
