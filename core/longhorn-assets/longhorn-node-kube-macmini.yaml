apiVersion: longhorn.io/v1beta2
kind: Node
metadata:
  name: kube-macmini
  namespace: longhorn-system
  finalizers:
    - longhorn.io
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  # etcd/control-plane node (bare-metal Mac Mini, SATA SSD): keep Longhorn
  # replicas off it so replica writes don't compete with etcd fsync.
  # The disks block must be present — Replace=true without it deletes the
  # auto-registered disk and the longhorn validating webhook denies that.
  allowScheduling: false
  disks:
    default-disk-816d35431a8152e1:
      allowScheduling: false
      diskDriver: ""
      diskType: filesystem
      evictionRequested: false
      path: /var/lib/longhorn/
      storageReserved: 144531822182
      tags: []
  evictionRequested: false
  instanceManagerCPURequest: 0
  name: kube-macmini
  tags: []
