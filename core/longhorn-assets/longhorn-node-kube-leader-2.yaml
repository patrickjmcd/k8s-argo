apiVersion: longhorn.io/v1beta2
kind: Node
metadata:
  name: kube-leader-2
  namespace: longhorn-system
  finalizers:
    - longhorn.io
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  # etcd/control-plane node: keep Longhorn replicas off its disk so replica
  # write bursts don't compete with etcd fsync latency (SATA SSD). Pods still
  # run here and can mount Longhorn volumes hosted elsewhere.
  allowScheduling: false
  disks:
    default-disk-c9bde521ad146345:
      allowScheduling: false
      diskDriver: ""
      diskType: filesystem
      evictionRequested: false
      path: /var/lib/longhorn/
      storageReserved: 4722035097
      tags: []
  # Phase 2: actively migrate existing replicas onto the NVMe Pis.
  evictionRequested: true
  instanceManagerCPURequest: 0
  name: kube-leader-2
  tags: []
