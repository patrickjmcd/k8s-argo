apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/manifest-generate-paths: .
    argocd.argoproj.io/sync-wave: "-2"
spec:
  destination:
    namespace: cert-manager
    name: in-cluster
  project: core-components
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  sources:
    - chart: cert-manager
      targetRevision: v1.21.0
      repoURL: https://charts.jetstack.io
      helm:
        valuesObject:
          crds:
            enabled: true
          # No CPU limits on any cert-manager component. A 15m limit is 1.5ms of CPU
          # per 100ms CFS period, which throttled all three (18-35%) despite each
          # averaging 1-3m. The webhook is on the API admission path, so throttling it
          # stalls any request touching cert-manager resources. Memory limits are kept
          # but given real headroom -- they were previously pinned 1Mi above requests,
          # one spike away from an OOMKill (cainjector idles at 91Mi of its old 122Mi).
          resources:
            requests:
              cpu: 20m
              memory: 128Mi
            limits:
              memory: 256Mi
          cainjector:
            resources:
              requests:
                cpu: 20m
                memory: 128Mi
              limits:
                memory: 320Mi
          webhook:
            resources:
              requests:
                cpu: 20m
                memory: 64Mi
              limits:
                memory: 192Mi
    - path: core/cert-manager
      repoURL: https://github.com/patrickjmcd/k8s-argo.git
      targetRevision: main
