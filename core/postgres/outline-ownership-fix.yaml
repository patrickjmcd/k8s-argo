apiVersion: batch/v1
kind: Job
metadata:
  name: outline-ownership-fix
  namespace: postgres
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: fix-ownership
          image: postgres:18-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: shared-postgres-superuser
                  key: password
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: shared-postgres-superuser
                  key: username
          command:
            - /bin/sh
            - -c
            - |
              set -e
              set -o pipefail
              ATTEMPTS=0
              until psql -h shared-postgres-rw -U "$PGUSER" -d postgres -tAc \
                "SELECT 1 FROM pg_database WHERE datname='outline'" 2>/dev/null | grep -q 1; do
                ATTEMPTS=$((ATTEMPTS + 1))
                if [ "$ATTEMPTS" -ge 30 ]; then
                  echo "Timed out waiting for outline database after 30 attempts"
                  exit 1
                fi
                echo "Waiting for outline database... (attempt ${ATTEMPTS}/30)"; sleep 5
              done
              psql -h shared-postgres-rw -U "$PGUSER" -d outline -tAc \
                "SELECT format(
                   CASE c.relkind
                     WHEN 'S' THEN 'ALTER SEQUENCE public.%I OWNER TO outline;'
                     WHEN 'v' THEN 'ALTER VIEW public.%I OWNER TO outline;'
                     WHEN 'm' THEN 'ALTER MATERIALIZED VIEW public.%I OWNER TO outline;'
                     ELSE 'ALTER TABLE public.%I OWNER TO outline;'
                   END, c.relname)
                 FROM pg_class c
                 JOIN pg_namespace n ON n.oid = c.relnamespace
                 JOIN pg_roles r ON r.oid = c.relowner
                 WHERE n.nspname = 'public'
                   AND c.relkind IN ('r', 'S', 'v', 'm', 'p')
                   AND r.rolname = current_user
                   AND NOT EXISTS (
                     SELECT 1 FROM pg_depend
                     WHERE objid = c.oid AND deptype = 'e'
                   )" \
                | psql -h shared-postgres-rw -U "$PGUSER" -d outline -1 -v ON_ERROR_STOP=1
              # Types (enums, domains, composites) live in pg_type, not pg_class.
              # Outline migrations run ALTER TYPE ... ADD VALUE, which requires ownership.
              psql -h shared-postgres-rw -U "$PGUSER" -d outline -tAc \
                "SELECT format('ALTER TYPE public.%I OWNER TO outline;', t.typname)
                 FROM pg_type t
                 JOIN pg_namespace n ON n.oid = t.typnamespace
                 JOIN pg_roles r ON r.oid = t.typowner
                 WHERE n.nspname = 'public'
                   AND t.typtype IN ('e', 'd', 'c')
                   AND r.rolname = current_user
                   AND NOT EXISTS (
                     SELECT 1 FROM pg_class c
                     WHERE c.reltype = t.oid AND c.relkind <> 'c'
                   )
                   AND NOT EXISTS (
                     SELECT 1 FROM pg_depend
                     WHERE objid = t.oid AND deptype = 'e'
                   )" \
                | psql -h shared-postgres-rw -U "$PGUSER" -d outline -1 -v ON_ERROR_STOP=1
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
