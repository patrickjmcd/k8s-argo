apiVersion: batch/v1
kind: Job
metadata:
  name: outline-ownership-fix
  namespace: postgres
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: fix-ownership
          image: postgres:18-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: shared-postgres-superuser
                  key: password
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: shared-postgres-superuser
                  key: username
          command:
            - /bin/sh
            - -c
            - |
              set -e
              until psql -h shared-postgres-rw -U "$PGUSER" -d postgres -tAc \
                "SELECT 1 FROM pg_database WHERE datname='outline'" 2>/dev/null | grep -q 1; do
                echo "Waiting for outline database..."; sleep 5
              done
              psql -h shared-postgres-rw -U "$PGUSER" -d outline -c "REASSIGN OWNED BY CURRENT_USER TO outline;"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
