apiVersion: batch/v1
kind: Job
metadata:
  name: n8n-ownership-fix
  namespace: postgres
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: fix-ownership
          image: postgres:18-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: shared-postgres-superuser
                  key: password
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: shared-postgres-superuser
                  key: username
          command:
            - /bin/sh
            - -c
            - |
              set -e
              set -o pipefail
              ATTEMPTS=0
              until psql -h shared-postgres-rw -U "$PGUSER" -d postgres -tAc \
                "SELECT 1 FROM pg_database WHERE datname='n8n'" 2>/dev/null | grep -q 1; do
                ATTEMPTS=$((ATTEMPTS + 1))
                if [ "$ATTEMPTS" -ge 30 ]; then
                  echo "Timed out waiting for n8n database after 30 attempts"
                  exit 1
                fi
                echo "Waiting for n8n database... (attempt ${ATTEMPTS}/30)"; sleep 5
              done
              psql -h shared-postgres-rw -U "$PGUSER" -d n8n -tAc \
                "SELECT format('ALTER FUNCTION public.%I(%s) OWNER TO n8n;',
                   p.proname, pg_get_function_identity_arguments(p.oid))
                 FROM pg_proc p
                 JOIN pg_namespace n ON p.pronamespace = n.oid
                 WHERE n.nspname = 'public'" \
                | psql -h shared-postgres-rw -U "$PGUSER" -d n8n -1 -v ON_ERROR_STOP=1
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
