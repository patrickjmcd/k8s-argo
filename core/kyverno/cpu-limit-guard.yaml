apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: cpu-limit-guard
  annotations:
    policies.kyverno.io/title: CPU Limit Guard
    policies.kyverno.io/category: Resource Management
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Audit-only. Flags containers whose CPU limit is small enough that the CFS
      quota, not total CPU, becomes the bottleneck.

      A CPU limit is enforced as a quota per 100ms scheduling period: 100m buys
      10ms of runtime per period, 15m buys 1.5ms. A bursty process needs a few
      contiguous ms to service an event, so under a small limit it exhausts the
      quota immediately and stalls until the next period -- while its *average*
      usage still reads comfortably below the limit. Average utilisation is
      therefore not a signal that a limit is safe.

      This bit the cluster in July 2026: flannel at 49m throttled 53-94% on
      every node while averaging 5-29m, and all three cert-manager components
      at 15m throttled 18-35% while averaging 1-3m. Both sit on critical paths
      (pod networking; API admission).

      The limits came from Goldilocks. Its numbers are VPA recommendations,
      which describe *requests* -- the dashboard's "Guaranteed" column simply
      mirrors the target into limits as well. Applying them that way forms a
      ratchet: the limit caps observed usage, the recommender then recommends
      the cap, and it is reapplied as the limit. The recommendation collapses
      to a point estimate and can never climb back. Confirmed in the data --
      cert-manager, pinned at 15m, had reached
      lowerBound == target == upperBound == 15m, while argocd-repo-server
      under a roomy 500m limit still showed a healthy 15m/35m/49m spread. Once
      collapsed, the dashboard's "Burstable" column is no help either, since it
      reads lowerBound and upperBound -- by then the same number.

      So: put Goldilocks CPU figures in requests. Set a CPU limit only as a
      deliberate runaway guard, sized well above peak rather than derived from
      average usage. Memory is a different story -- it is incompressible and
      not scheduled in periods, so memory limits remain correct (with headroom).

      Audit rather than Enforce on purpose. A blocking rule here would reject
      pods cluster-wide, including system components, for what is a
      performance smell and not always a defect -- some workloads legitimately
      want a tight cap. Findings surface in PolicyReports:
        kubectl get polr -A -o wide | grep cpu-limit-guard
spec:
  # Audit only -- never blocks admission. See the note above before changing.
  background: true
  rules:
    - name: cpu-limit-below-cfs-safe-floor
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        failureAction: Audit
        # No {{ element.* }} here: Kyverno rejects foreach variables in a
        # rule-level message, and foreach has no message field of its own, so
        # the offending container cannot be named. The PolicyReport identifies
        # the pod; `kubectl get pod <name> -o jsonpath=` the limits to find it.
        message: >-
          A container in this pod sets a CPU limit below 100m, which is under
          10ms of quota per 100ms CFS period. Bursty workloads throttle badly
          there even while averaging well below the limit, so low average
          utilisation does not mean the limit is safe. If the number came from
          Goldilocks it belongs in requests, not limits -- applying it as a
          limit forms a ratchet that collapses the recommendation.
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                all:
                  # Containers with no CPU limit are the desired state, not a finding.
                  - key: "{{ element.resources.limits.cpu || '' }}"
                    operator: NotEquals
                    value: ""
                  - key: "{{ element.resources.limits.cpu }}"
                    operator: LessThan
                    value: "100m"
