apiVersion: tailscale.com/v1alpha1
kind: Connector
metadata:
  name: cluster-subnet-router
  namespace: tailscale
spec:
  hostname: k8s-subnet-router
  subnetRouter:
    advertiseRoutes:
      - "192.168.8.0/24"  # node/MetalLB network — reaches Traefik at .200
      - "10.43.0.0/16"    # k3s service CIDR
      - "10.42.0.0/16"    # k3s pod CIDR (flannel)
  tags:
    - tag:k8s-operator
