---
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: k3s-agent
  namespace: system-upgrade
  labels:
    k3s-upgrade: agent
spec:
  serviceAccountName: system-upgrade
  concurrency: 1
  # Pinned, not channel-tracked — keep in lockstep with server-plan.yaml.
  # renovate: datasource=github-releases depName=k3s-io/k3s
  version: v1.36.2+k3s1
  # Kyverno's node-failure-tolerations policy now appends these instead
  # of replacing the list, so declaring them is optional — kept as
  # belt-and-suspenders. See server-plan.yaml.
  tolerations:
    - key: node.kubernetes.io/not-ready
      operator: Exists
      effect: NoExecute
      tolerationSeconds: 30
    - key: node.kubernetes.io/unreachable
      operator: Exists
      effect: NoExecute
      tolerationSeconds: 30
    # media-server is tainted dedicated=heavy:NoSchedule
    - key: dedicated
      operator: Exists
      effect: NoSchedule
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: NotIn
        values:
          - "true"
  prepare:
    image: rancher/k3s-upgrade
    args:
      - "prepare"
      - "k3s-server"
  upgrade:
    image: rancher/k3s-upgrade
