---
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: k3s-server
  namespace: system-upgrade
spec:
  serviceAccountName: system-upgrade
  concurrency: 1
  # Pinned, not channel-tracked: the stable channel jumped 1.34 -> 1.36,
  # which would skip a minor version (unsupported). Bump deliberately,
  # one minor at a time. Renovate proposes bumps; never automerge.
  # renovate: datasource=github-releases depName=k3s-io/k3s
  version: v1.35.6+k3s1
  cordon: true
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: In
        values:
          - "true"
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
    # Kyverno's node-failure-tolerations policy REPLACES the whole
    # tolerations list on pods that lack these two, which strips the
    # control-plane toleration above and leaves the upgrade pod
    # unschedulable. Declaring them explicitly makes the policy skip
    # this pod. Same pattern as apps/immich and core/prometheus.
    - key: node.kubernetes.io/not-ready
      operator: Exists
      effect: NoExecute
      tolerationSeconds: 30
    - key: node.kubernetes.io/unreachable
      operator: Exists
      effect: NoExecute
      tolerationSeconds: 30
  upgrade:
    image: rancher/k3s-upgrade
