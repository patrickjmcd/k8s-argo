# Writes /etc/rancher/k3s/registries.yaml to every node so k3s uses the
# pull-through caches. The file is re-applied every hour in case the pod restarts.
#
# k3s reads registries.yaml at startup only — after this DaemonSet runs,
# restart k3s on each node for the mirrors to activate:
#   kubectl drain <node> --ignore-daemonsets --delete-emptydir-data
#   ssh <node> sudo systemctl restart k3s        # server nodes
#   ssh <node> sudo systemctl restart k3s-agent  # agent nodes
#   kubectl uncordon <node>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: registries-yaml
  namespace: registry-mirror
data:
  registries.yaml: |
    mirrors:
      "docker.io":
        endpoint:
          - "http://192.168.8.201:5001"
      "ghcr.io":
        endpoint:
          - "http://192.168.8.201:5002"
      "registry.k8s.io":
        endpoint:
          - "http://192.168.8.201:5003"
      "quay.io":
        endpoint:
          - "http://192.168.8.201:5004"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: registry-mirror-node-config
  namespace: registry-mirror
spec:
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: registry-mirror-node-config
  template:
    metadata:
      labels:
        app: registry-mirror-node-config
    spec:
      tolerations:
        - operator: Exists
      containers:
        - name: configure
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              mkdir -p /host/etc/rancher/k3s
              while true; do
                cp /config/registries.yaml /host/etc/rancher/k3s/registries.yaml
                sleep 3600
              done
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-etc-rancher
              mountPath: /host/etc/rancher
            - name: config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: 1m
              memory: 8Mi
            limits:
              cpu: 10m
              memory: 16Mi
      volumes:
        - name: host-etc-rancher
          hostPath:
            path: /etc/rancher
            type: DirectoryOrCreate
        - name: config
          configMap:
            name: registries-yaml
