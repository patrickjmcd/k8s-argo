apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/manifest-generate-paths: .
    argocd.argoproj.io/sync-wave: "0"
spec:
  destination:
    namespace: prometheus
    name: in-cluster
  project: core-components
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
  sources:
    - path: core/prometheus-assets
      repoURL: https://github.com/patrickjmcd/k8s-argo.git
      targetRevision: main
    - repoURL: https://github.com/patrickjmcd/k8s-argo.git
      targetRevision: main
      path: core/grafana-assets
    - chart: kube-prometheus-stack
      targetRevision: 87.0.0
      repoURL: https://prometheus-community.github.io/helm-charts
      helm:
        releaseName: kube-prometheus-stack
        valuesObject:
          crds:
            updateJob:
              enabled: true
          prometheus:
            prometheusSpec:
              scrapeInterval: 60s
              retentionSize: 8GiB
              nodeSelector:
                kubernetes.io/arch: arm64
              containers:
                - name: prometheus
                  startupProbe:
                    httpGet:
                      path: /-/ready
                      port: 9090
                      scheme: HTTP
                    failureThreshold: 40
                    periodSeconds: 15
                    timeoutSeconds: 10
                    successThreshold: 1
                  livenessProbe:
                    httpGet:
                      path: /-/healthy
                      port: 9090
                      scheme: HTTP
                    failureThreshold: 10
                    periodSeconds: 15
                    timeoutSeconds: 10
                    successThreshold: 1
              resources:
                requests:
                  cpu: 200m
                  memory: 1Gi
                limits:
                  cpu: 1000m
                  memory: 5Gi
              podMonitorSelector: { }
              podMonitorSelectorNilUsesHelmValues: false
              podMonitorNamespaceSelector:
                matchLabels:
                  prometheus: enabled
              serviceMonitorSelector: { }
              serviceMonitorSelectorNilUsesHelmValues: false
              serviceMonitorNamespaceSelector:
                matchLabels:
                  prometheus: enabled
              secrets:
                - jellyfin-json-exporter-1pw
              additionalScrapeConfigs:
                - job_name: jellyfin
                  metrics_path: /metrics
                  scrape_interval: 60s
                  authorization:
                    credentials_file: /etc/prometheus/secrets/jellyfin-json-exporter-1pw/api-key
                  static_configs:
                    - targets:
                        - 192.168.1.210:8096
                - job_name: jellyfin-sessions
                  metrics_path: /probe
                  params:
                    module: [jellyfin]
                  static_configs:
                    - targets:
                        - http://jellyfin.media.svc.cluster.local:8096/Sessions
                  relabel_configs:
                    - source_labels: [__address__]
                      target_label: __param_target
                    - source_labels: [__param_target]
                      target_label: instance
                    - target_label: __address__
                      replacement: json-exporter.prometheus.svc:7979
                - job_name: pve
                  static_configs:
                    - targets:
                        - 192.168.1.10
                        - 192.168.1.12
                        - 192.168.1.13
                  metrics_path: /pve
                  params:
                    module: [default]
                  relabel_configs:
                    - source_labels: [__address__]
                      target_label: __param_target
                    - source_labels: [__param_target]
                      target_label: instance
                    - target_label: __address__
                      replacement: pve-exporter.prometheus.svc:9221
          prometheusOperator:
            resources:
              requests:
                cpu: 15m
                memory: 100Mi
              limits:
                cpu: 200m
                memory: 256Mi
          alertmanager:
            alertmanagerSpec:
              nodeSelector:
                kubernetes.io/arch: arm64
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
              alertmanagerConfigMatcherStrategy:
                type: None
              alertmanagerConfigSelector: {}
              alertmanagerConfigNamespaceSelector: {}
            config:
              global:
                resolve_timeout: 5m
              route:
                group_by: ['alertname', 'namespace']
                group_wait: 30s
                group_interval: 5m
                repeat_interval: 12h
                receiver: "null"
                routes:
                  - receiver: "null"
                    matchers:
                      - alertname = Watchdog
                  - receiver: "null"
                    matchers:
                      - alertname = InfoInhibitor
                  - receiver: "null"
                    matchers:
                      - alertname =~ "KubeSchedulerDown|KubeProxyDown|KubeControllerManagerDown"
                  - receiver: "null"
                    matchers:
                      - alertname = CPUThrottlingHigh
                      - severity = info
              receivers:
                - name: "null"
              inhibit_rules:
                - source_matchers:
                    - severity="critical"
                  target_matchers:
                    - severity="warning"
                  equal: ['alertname', 'namespace']
          prometheus-node-exporter:
            affinity: null
            hostNetwork: false
            hostPID: false
            tolerations:
              - effect: NoExecute
                key: node.kubernetes.io/not-ready
                operator: Exists
                tolerationSeconds: 30
              - effect: NoExecute
                key: node.kubernetes.io/unreachable
                operator: Exists
                tolerationSeconds: 30
            resources:
              requests:
                cpu: 23m
                memory: 100Mi
              limits:
                memory: 100Mi
          kube-state-metrics:
            resources:
              requests:
                cpu: 23m
                memory: 100Mi
              limits:
                memory: 100Mi
          grafana:
            deploymentStrategy:
              type: Recreate
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: kubernetes.io/hostname
                          operator: NotIn
                          values:
                            - jetson-nano-kube0
            tolerations:
              - effect: NoExecute
                key: node.kubernetes.io/not-ready
                operator: Exists
                tolerationSeconds: 30
              - effect: NoExecute
                key: node.kubernetes.io/unreachable
                operator: Exists
                tolerationSeconds: 30
            resources:
              requests:
                cpu: 23m
                memory: 300Mi
              limits:
                memory: 512Mi
            grafana.ini:
              server:
                root_url: https://grafana.x.pmcd.io
            persistence:
              type: pvc
              enabled: true
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              size: 5Gi
