apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubernetes-mcp-server
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/manifest-generate-paths: .
spec:
  destination:
    namespace: kubernetes-mcp-server
    name: in-cluster
  project: core-components
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  sources:
    - repoURL: oci://ghcr.io/containers/charts/kubernetes-mcp-server
      targetRevision: 0.1.0
      helm:
        releaseName: kubernetes-mcp-server
        valuesObject:
          ingress:
            enabled: false
          rbac:
            extraClusterRoleBindings:
              - name: kubernetes-mcp-server-admin
                roleRef:
                  name: cluster-admin
                  external: true
          extraManifests:
            - |
              apiVersion: gateway.networking.k8s.io/v1
              kind: HTTPRoute
              metadata:
                name: kubernetes-mcp-server
                namespace: kubernetes-mcp-server
              spec:
                parentRefs:
                  - group: gateway.networking.k8s.io
                    kind: Gateway
                    name: traefik-gateway
                    namespace: default
                hostnames:
                  - mcp.x.pmcd.io
                rules:
                  - matches:
                      - path:
                          type: PathPrefix
                          value: /
                    backendRefs:
                      - name: kubernetes-mcp-server
                        kind: Service
                        port: 8080
