apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-jellyfin
  namespace: prometheus
  labels:
    grafana_dashboard: "1"
data:
  jellyfin.json: |
    {
      "title": "Jellyfin",
      "uid": "jellyfin-sessions",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "1m",
      "time": { "from": "now-6h", "to": "now" },
      "panels": [
        {
          "type": "state-timeline",
          "title": "Jellyfin Playback",
          "id": 1,
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "continuous-GrYlRd" },
              "custom": {
                "lineWidth": 0,
                "fillOpacity": 70,
                "spanNulls": false,
                "insertNulls": false,
                "hideFrom": { "tooltip": false, "viz": false, "legend": false }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 80 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "mergeValues": true,
            "showValue": "auto",
            "alignValue": "left",
            "rowHeight": 0.9,
            "legend": { "showLegend": true, "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "editorMode": "code",
              "expr": "sum by (user_name, item_index_clean, item_type) (label_replace(label_join(label_join(jellyfin_is_paused{job=\"jellyfin-sessions\"}, \"item_index\", \"\", \"season_index\", \"episode_index\"), \"full_name\", \" - \", \"series_name\", \"item_index\", \"item_name\"), \"item_index_clean\", \"$1\", \"full_name\", \"^[- ]*(.*?)[- ]*$\"))",
              "instant": false,
              "legendFormat": "__auto",
              "range": true,
              "refId": "A"
            }
          ],
          "transformations": [
            { "id": "seriesToRows", "options": {} },
            {
              "id": "extractFields",
              "options": { "keepTime": false, "replace": false, "source": "Metric" }
            },
            {
              "id": "filterByValue",
              "options": {
                "filters": [{ "config": { "id": "isNotNull", "options": {} }, "fieldName": "user_name" }],
                "match": "any",
                "type": "include"
              }
            },
            {
              "id": "calculateField",
              "options": {
                "alias": "Item",
                "mode": "reduceRow",
                "reduce": { "include": ["item_index_clean"], "reducer": "firstNotNull" }
              }
            },
            {
              "id": "calculateField",
              "options": {
                "alias": "Name",
                "mode": "reduceRow",
                "reduce": { "include": ["user_name"], "reducer": "firstNotNull" }
              }
            },
            {
              "id": "calculateField",
              "options": {
                "alias": "Temp",
                "mode": "reduceRow",
                "reduce": { "include": ["Item"], "reducer": "firstNotNull" },
                "replaceFields": false
              }
            },
            {
              "id": "filterByValue",
              "options": {
                "filters": [{ "config": { "id": "regex", "options": { "value": "(Movie|Episode)" } }, "fieldName": "item_type" }],
                "match": "any",
                "type": "include"
              }
            },
            {
              "id": "filterByValue",
              "options": {
                "filters": [{ "config": { "id": "notEqual", "options": { "value": 1 } }, "fieldName": "Value" }],
                "match": "any",
                "type": "include"
              }
            },
            {
              "id": "partitionByValues",
              "options": { "fields": ["Name"] }
            },
            {
              "id": "filterFieldsByName",
              "options": { "include": { "pattern": "Temp|Time (.*)" } }
            },
            {
              "id": "renameByRegex",
              "options": { "regex": "Temp (.*)", "renamePattern": "$1" }
            }
          ]
        }
      ]
    }
