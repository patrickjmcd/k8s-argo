apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-jellyfin
  namespace: prometheus
  labels:
    grafana_dashboard: "1"
data:
  jellyfin.json: |
    {
      "annotations": [
        {
          "kind": "AnnotationQuery",
          "spec": {
            "builtIn": true,
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "query": {
              "datasource": {
                "name": "-- Grafana --"
              },
              "group": "grafana",
              "kind": "DataQuery",
              "spec": {},
              "version": "v0"
            }
          }
        }
      ],
      "cursorSync": "Off",
      "editable": true,
      "elements": {
        "panel-1": {
          "kind": "Panel",
          "spec": {
            "data": {
              "kind": "QueryGroup",
              "spec": {
                "queries": [
                  {
                    "kind": "PanelQuery",
                    "spec": {
                      "hidden": false,
                      "query": {
                        "datasource": {
                          "name": "prometheus"
                        },
                        "group": "prometheus",
                        "kind": "DataQuery",
                        "spec": {
                          "editorMode": "code",
                          "expr": "sum by (user_name, item_index_clean, item_type) (label_replace(label_join(label_join(jellyfin_is_paused{job=\"jellyfin-sessions\"}, \"item_index\", \"\", \"season_index\", \"episode_index\"), \"full_name\", \" - \", \"series_name\", \"item_index\", \"item_name\"), \"item_index_clean\", \"$1\", \"full_name\", \"^[- ]*(.*?)[- ]*$\"))",
                          "instant": false,
                          "legendFormat": "__auto",
                          "range": true
                        },
                        "version": "v0"
                      },
                      "refId": "A"
                    }
                  }
                ],
                "queryOptions": {},
                "transformations": [
                  {
                    "group": "seriesToRows",
                    "kind": "Transformation",
                    "spec": {
                      "options": {}
                    }
                  },
                  {
                    "group": "extractFields",
                    "kind": "Transformation",
                    "spec": {
                      "options": {
                        "keepTime": false,
                        "replace": false,
                        "source": "Metric"
                      }
                    }
                  },
                  {
                    "group": "filterByValue",
                    "kind": "Transformation",
                    "spec": {
                      "options": {
                        "filters": [
                          {
                            "config": {
                              "id": "isNotNull",
                              "options": {}
                            },
                            "fieldName": "user_name"
                          }
                        ],
                        "match": "any",
                        "type": "include"
                      }
                    }
                  },
                  {
                    "group": "calculateField",
                    "kind": "Transformation",
                    "spec": {
                      "options": {
                        "alias": "Item",
                        "mode": "reduceRow",
                        "reduce": {
                          "include": [
                            "item_index_clean"
                          ],
                          "reducer": "firstNotNull"
                        }
                      }
                    }
                  },
                  {
                    "group": "calculateField",
                    "kind": "Transformation",
                    "spec": {
                      "options": {
                        "alias": "Name",
                        "mode": "reduceRow",
                        "reduce": {
                          "include": [
                            "user_name"
                          ],
                          "reducer": "firstNotNull"
                        }
                      }
                    }
                  },
                  {
                    "group": "calculateField",
                    "kind": "Transformation",
                    "spec": {
                      "options": {
                        "alias": "Temp",
                        "mode": "reduceRow",
                        "reduce": {
                          "include": [
                            "Item"
                          ],
                          "reducer": "firstNotNull"
                        },
                        "replaceFields": false
                      }
                    }
                  },
                  {
                    "group": "filterByValue",
                    "kind": "Transformation",
                    "spec": {
                      "options": {
                        "filters": [
                          {
                            "config": {
                              "id": "regex",
                              "options": {
                                "value": "(Movie|Episode)"
                              }
                            },
                            "fieldName": "item_type"
                          }
                        ],
                        "match": "any",
                        "type": "include"
                      }
                    }
                  },
                  {
                    "group": "filterByValue",
                    "kind": "Transformation",
                    "spec": {
                      "options": {
                        "filters": [
                          {
                            "config": {
                              "id": "notEqual",
                              "options": {
                                "value": 1
                              }
                            },
                            "fieldName": "Value"
                          }
                        ],
                        "match": "any",
                        "type": "include"
                      }
                    }
                  },
                  {
                    "group": "partitionByValues",
                    "kind": "Transformation",
                    "spec": {
                      "options": {
                        "fields": [
                          "Name"
                        ]
                      }
                    }
                  },
                  {
                    "group": "filterFieldsByName",
                    "kind": "Transformation",
                    "spec": {
                      "options": {
                        "include": {
                          "pattern": "Temp|Time (.*)"
                        }
                      }
                    }
                  },
                  {
                    "group": "renameByRegex",
                    "kind": "Transformation",
                    "spec": {
                      "options": {
                        "regex": "Temp (.*)",
                        "renamePattern": "$1"
                      }
                    }
                  }
                ]
              }
            },
            "description": "",
            "id": 1,
            "links": [],
            "title": "Jellyfin Playback",
            "vizConfig": {
              "group": "state-timeline",
              "kind": "VizConfig",
              "spec": {
                "fieldConfig": {
                  "defaults": {
                    "color": {
                      "mode": "continuous-GrYlRd"
                    },
                    "custom": {
                      "axisPlacement": "auto",
                      "fillOpacity": 70,
                      "hideFrom": {
                        "legend": false,
                        "tooltip": false,
                        "viz": false
                      },
                      "insertNulls": false,
                      "lineWidth": 0,
                      "spanNulls": false
                    },
                    "thresholds": {
                      "mode": "absolute",
                      "steps": [
                        {
                          "color": "green",
                          "value": 0
                        },
                        {
                          "color": "red",
                          "value": 80
                        }
                      ]
                    }
                  },
                  "overrides": []
                },
                "options": {
                  "alignValue": "left",
                  "annotations": {
                    "clustering": -1,
                    "multiLane": false
                  },
                  "legend": {
                    "displayMode": "list",
                    "placement": "bottom",
                    "showLegend": true
                  },
                  "mergeValues": true,
                  "rowHeight": 0.9,
                  "showValue": "auto",
                  "tooltip": {
                    "hideZeros": false,
                    "mode": "single",
                    "sort": "none"
                  }
                }
              },
              "version": "13.0.1+security-01"
            }
          }
        }
      },
      "layout": {
        "kind": "GridLayout",
        "spec": {
          "items": [
            {
              "kind": "GridLayoutItem",
              "spec": {
                "element": {
                  "kind": "ElementReference",
                  "name": "panel-1"
                },
                "height": 6,
                "width": 24,
                "x": 0,
                "y": 0
              }
            }
          ]
        }
      },
      "links": [],
      "liveNow": false,
      "preload": false,
      "tags": [],
      "timeSettings": {
        "autoRefresh": "1m",
        "autoRefreshIntervals": [
          "5s",
          "10s",
          "30s",
          "1m",
          "5m",
          "15m",
          "30m",
          "1h",
          "2h",
          "1d"
        ],
        "fiscalYearStartMonth": 0,
        "from": "now-6h",
        "hideTimepicker": false,
        "timezone": "browser",
        "to": "now"
      },
      "title": "Jellyfin",
      "variables": []
    }
