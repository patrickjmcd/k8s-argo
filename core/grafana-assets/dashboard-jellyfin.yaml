apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-jellyfin
  namespace: prometheus
  labels:
    grafana_dashboard: "1"
data:
  jellyfin.json: |
    {
      "title": "Jellyfin",
      "uid": "jellyfin-sessions",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "1m",
      "time": { "from": "now-6h", "to": "now" },
      "panels": [
        {
          "type": "state-timeline",
          "title": "Playback Sessions",
          "id": 1,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "continuous-GrYlRd" },
              "custom": {
                "lineWidth": 0,
                "fillOpacity": 70,
                "spanNulls": false,
                "insertNulls": false,
                "hideFrom": { "tooltip": false, "viz": false, "legend": false }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 80 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "mergeValues": true,
            "showValue": "auto",
            "alignValue": "left",
            "rowHeight": 0.9,
            "legend": { "showLegend": true, "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "editorMode": "code",
              "expr": "sum by (user_name, item_index_clean, item_type) (label_replace(label_join(label_join(jellyfin_is_paused{job=\"jellyfin-sessions\"}, \"item_index\", \"\", \"season_index\", \"episode_index\"), \"full_name\", \" - \", \"series_name\", \"item_index\", \"item_name\"), \"item_index_clean\", \"$1\", \"full_name\", \"^[- ]*(.*?)[- ]*$\"))",
              "instant": false,
              "legendFormat": "__auto",
              "range": true,
              "refId": "A"
            }
          ],
          "transformations": [
            { "id": "seriesToRows", "options": {} },
            { "id": "extractFields", "options": { "keepTime": false, "replace": false, "source": "Metric" } },
            { "id": "filterByValue", "options": { "filters": [{ "config": { "id": "isNotNull", "options": {} }, "fieldName": "user_name" }], "match": "any", "type": "include" } },
            { "id": "calculateField", "options": { "alias": "Item", "mode": "reduceRow", "reduce": { "include": ["item_index_clean"], "reducer": "firstNotNull" } } },
            { "id": "calculateField", "options": { "alias": "Name", "mode": "reduceRow", "reduce": { "include": ["user_name"], "reducer": "firstNotNull" } } },
            { "id": "calculateField", "options": { "alias": "Temp", "mode": "reduceRow", "reduce": { "include": ["Item"], "reducer": "firstNotNull" }, "replaceFields": false } },
            { "id": "filterByValue", "options": { "filters": [{ "config": { "id": "regex", "options": { "value": "(Movie|Episode)" } }, "fieldName": "item_type" }], "match": "any", "type": "include" } },
            { "id": "filterByValue", "options": { "filters": [{ "config": { "id": "notEqual", "options": { "value": 1 } }, "fieldName": "Value" }], "match": "any", "type": "include" } },
            { "id": "partitionByValues", "options": { "fields": ["Name"] } },
            { "id": "filterFieldsByName", "options": { "include": { "pattern": "Temp|Time (.*)" } } },
            { "id": "renameByRegex", "options": { "regex": "Temp (.*)", "renamePattern": "$1" } }
          ]
        },
        {
          "type": "timeseries",
          "title": "Network Throughput",
          "id": 2,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "binBps",
              "custom": { "lineInterpolation": "smooth", "fillOpacity": 10 }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Sent" }, "properties": [{ "id": "color", "value": { "fixedColor": "blue", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Received" }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] }
            ]
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "editorMode": "code",
              "expr": "rate(dotnet_sockets_bytes_sent_total{job=\"jellyfin\"}[5m])",
              "legendFormat": "Sent",
              "range": true,
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "editorMode": "code",
              "expr": "rate(dotnet_sockets_bytes_received_total{job=\"jellyfin\"}[5m])",
              "legendFormat": "Received",
              "range": true,
              "refId": "B"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Memory",
          "id": 3,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "lineInterpolation": "smooth", "fillOpacity": 10 }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Working Set" }, "properties": [{ "id": "color", "value": { "fixedColor": "purple", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "GC Heap" }, "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }] }
            ]
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "editorMode": "code",
              "expr": "process_working_set_bytes{job=\"jellyfin\"}",
              "legendFormat": "Working Set",
              "range": true,
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "editorMode": "code",
              "expr": "dotnet_gc_heap_size_bytes{job=\"jellyfin\"}",
              "legendFormat": "GC Heap",
              "range": true,
              "refId": "B"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "CPU Usage",
          "id": 4,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "custom": { "lineInterpolation": "smooth", "fillOpacity": 10 }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "editorMode": "code",
              "expr": "rate(process_cpu_seconds_total{job=\"jellyfin\"}[5m])",
              "legendFormat": "CPU",
              "range": true,
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Active HTTP Connections",
          "id": 5,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineInterpolation": "smooth", "fillOpacity": 10 }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "editorMode": "code",
              "expr": "microsoft_aspnetcore_server_kestrel_current_connections{job=\"jellyfin\"}",
              "legendFormat": "Connections",
              "range": true,
              "refId": "A"
            }
          ]
        }
      ]
    }
