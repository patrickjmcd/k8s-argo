# /etc/pgbackrest.conf
# Single repository configuration - UniFi handles replication

[global]
# Repository Configuration (single location)
repo1-path=/mnt/backups/pgbackrest
repo1-retention-full=4
repo1-retention-diff=4

# Performance Settings
# Parallel processes for faster backups
process-max=4
log-level-console=info
log-level-file=detail
# Force checkpoint immediately
start-fast=y

# Compression
# Fast compression (swap to 'zst' for better ratio)
compress-type=lz4
# Compression level 1-9       
compress-level=3

lock-path=/var/spool/pgbackrest

# Stanza Configuration
[main-db]
pg1-path=/var/lib/postgresql/18/main
pg1-port=5432
pg1-user=postgres

