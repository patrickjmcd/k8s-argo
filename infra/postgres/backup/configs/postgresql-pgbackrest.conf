# pgBackRest Configuration
# Enables WAL archiving and point-in-time recovery

# Write-Ahead Log (WAL) Settings
wal_level = replica
archive_mode = on
archive_command = 'pgbackrest --stanza=main-db archive-push %p'
archive_timeout = 3600

# Restore Settings
restore_command = 'pgbackrest --stanza=main-db archive-get %f "%p"'

# Checkpoint settings for better performance
checkpoint_timeout = 15min
max_wal_size = 2GB
min_wal_size = 1GB