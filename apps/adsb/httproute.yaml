apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: adsb-httproute
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway
      namespace: default
  hostnames:
    - adsb.x.pmcd.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ultrafeeder
          kind: Service
          namespace: adsb
          port: 80
