# Feeder identifiers + location live in 1Password, NOT in git
# (same posture as the frigate RTSP URLs).
#
# Create item  vaults/Kubernetes/items/adsb  with these fields:
#   FEEDER_ID          -> your FlightAware / piaware feeder-id
#   ULTRAFEEDER_CONFIG -> the full adsb,... ;mlat,... aggregator string,
#                         WITH the local UAT ingest appended:
#                           ...;adsb,dump978,30978,uat_in
#                         (that last entry is what pulls 978 into readsb;
#                          drop it if you run 1090 only.)
#   LAT                -> 39.0009
#   LON                -> -94.58351
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: adsb-1pw
spec:
  itemPath: "vaults/Kubernetes/items/adsb"
