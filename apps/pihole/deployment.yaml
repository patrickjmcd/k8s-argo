apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
  labels:
    app: pihole
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pihole
  template:
    metadata:
      labels:
        app: pihole
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - jetson-nano-kube0
      initContainers:
        - name: patch-pihole-config
          image: busybox:1.38
          command:
            - sh
            - -c
            - |
              TOML=/etc/pihole/pihole.toml
              [ -f "$TOML" ] || exit 0
              sed -i 's/^\( *resolveIPv4\) = .*/\1 = false/' "$TOML"
              sed -i 's/^\( *resolveIPv6\) = .*/\1 = false/' "$TOML"
              sed -i 's/^\( *networkNames\) = .*/\1 = false/' "$TOML"
              sed -i 's/^\( *refreshNames\) = .*/\1 = "NONE"/' "$TOML"
              sed -i 's|^\( *database\) = "/etc/pihole/pihole-FTL.db"|\1 = "/var/ftl/pihole-FTL.db"|' "$TOML"
              sed -i 's|^\( *tmp_db\) = "/etc/pihole/pihole-tmp.db"|\1 = "/var/ftl/pihole-tmp.db"|' "$TOML"
              sed -i 's|^\( *gravity\) = "/etc/pihole/gravity.db"|\1 = "/var/ftl/gravity.db"|' "$TOML"
              cp /etc/pihole/gravity.db /var/ftl/gravity.db 2>/dev/null || true
          volumeMounts:
            - name: pihole-data
              mountPath: /etc/pihole
      containers:
        - name: pihole
          image: pihole/pihole:2026.07.1
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: TZ
              value: "America/Chicago"
            - name: PIHOLE_DNS_1
              value: "1.1.1.1"
            - name: PIHOLE_DNS_2
              value: "8.8.8.8"
            - name: DNSMASQ_LISTENING
              value: "all"
            - name: VIRTUAL_HOST
              value: "pihole.x.pmcd.io"
            - name: FTLCONF_misc_etc_dnsmasq_d
              value: "true"
            - name: FTLCONF_database_maxDBdays
              value: "28"
            - name: FTLCONF_files_database
              value: "/var/ftl/pihole-FTL.db"
            - name: FTLCONF_files_tmp_db
              value: "/var/ftl/pihole-tmp.db"
            - name: FTLCONF_files_gravity
              value: "/var/ftl/gravity.db"
            - name: FTLCONF_resolver_resolveIPv4
              value: "false"
            - name: FTLCONF_resolver_resolveIPv6
              value: "false"
            - name: FTLCONF_resolver_networkNames
              value: "false"
            - name: FTLCONF_resolver_refreshNames
              value: "NONE"
            - name: FTLCONF_dns_rateLimit_count
              value: "1000"
            - name: FTLCONF_dns_rateLimit_interval
              value: "60"
          envFrom:
            - secretRef:
                name: pihole-1pw
          volumeMounts:
            - name: pihole-data
              mountPath: /etc/pihole
            - name: local-dns-config
              mountPath: /etc/dnsmasq.d
            - name: ftl-db
              mountPath: /var/ftl
            - name: hosts-override
              mountPath: /etc/pihole/hosts/local-overrides
              subPath: local-overrides
          startupProbe:
            exec:
              command:
                - dig
                - +time=2
                - +tries=1
                - x.pmcd.io
                - "@127.0.0.1"
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 50
          livenessProbe:
            exec:
              command:
                - dig
                - +time=2
                - +tries=1
                - x.pmcd.io
                - "@127.0.0.1"
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 20m
              memory: 256Mi
            limits:
              memory: 600Mi
      volumes:
        - name: pihole-data
          persistentVolumeClaim:
            claimName: pihole-data
        - name: local-dns-config
          configMap:
            name: pihole-local-dns
        - name: hosts-override
          configMap:
            name: pihole-hosts-override
        - name: ftl-db
          emptyDir: {}
