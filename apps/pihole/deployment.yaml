apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
  labels:
    app: pihole
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pihole
  template:
    metadata:
      labels:
        app: pihole
    spec:
      containers:
        - name: pihole
          image: pihole/pihole:2026.04.0
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: TZ
              value: "America/Chicago"
            - name: PIHOLE_DNS_1
              value: "1.1.1.1"
            - name: PIHOLE_DNS_2
              value: "8.8.8.8"
            - name: DNSMASQ_LISTENING
              value: "all"
            - name: VIRTUAL_HOST
              value: "pihole.x.pmcd.io"
          envFrom:
            - secretRef:
                name: pihole-1pw
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    # Wait for Pi-hole API to be ready (up to 120s)
                    i=0
                    until curl -sf http://localhost/api/auth > /dev/null 2>&1 || [ $i -ge 60 ]; do
                      sleep 2
                      i=$((i+1))
                    done
                    [ $i -ge 60 ] && exit 0

                    # Authenticate and get session token
                    RESPONSE=$(curl -sf -X POST http://localhost/api/auth \
                      -H "Content-Type: application/json" \
                      -d "{\"password\":\"${WEBPASSWORD}\"}")
                    TOKEN=$(echo "$RESPONSE" | grep -o '"sid":"[^"]*"' | cut -d'"' -f4)
                    [ -z "$TOKEN" ] && exit 0

                    # Add each adlist; duplicates are silently ignored by the API
                    while IFS= read -r url; do
                      case "$url" in '#'*|''|' '*) continue ;; esac
                      curl -sf -X POST http://localhost/api/lists \
                        -H "X-FTL-SID: $TOKEN" \
                        -H "Content-Type: application/json" \
                        -d "{\"address\":\"${url}\",\"type\":0,\"comment\":\"seeded-from-k8s\",\"enabled\":true,\"groups\":[0]}" \
                        > /dev/null 2>&1 || true
                    done < /adlists-config/adlists.list

                    # Trigger gravity update to compile the new lists
                    curl -sf -X POST http://localhost/api/action/gravity \
                      -H "X-FTL-SID: $TOKEN" > /dev/null 2>&1 || true
          volumeMounts:
            - name: pihole-data
              mountPath: /etc/pihole
            - name: pihole-dnsmasq
              mountPath: /etc/dnsmasq.d
            - name: adlists-config
              mountPath: /adlists-config
              readOnly: true
          readinessProbe:
            httpGet:
              path: /admin/
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 20m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: pihole-data
          persistentVolumeClaim:
            claimName: pihole-data
        - name: pihole-dnsmasq
          persistentVolumeClaim:
            claimName: pihole-dnsmasq
        - name: adlists-config
          configMap:
            name: pihole-adlists
