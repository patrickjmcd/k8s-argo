apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
  labels:
    app: pihole
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pihole
  template:
    metadata:
      labels:
        app: pihole
    spec:
      containers:
        - name: pihole
          image: pihole/pihole:2026.05.0
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: TZ
              value: "America/Chicago"
            - name: PIHOLE_DNS_1
              value: "1.1.1.1"
            - name: PIHOLE_DNS_2
              value: "8.8.8.8"
            - name: DNSMASQ_LISTENING
              value: "all"
            - name: VIRTUAL_HOST
              value: "pihole.x.pmcd.io"
            - name: FTLCONF_misc_etc_dnsmasq_d
              value: "true"
            - name: FTLCONF_database_maxDBdays
              value: "28"
          envFrom:
            - secretRef:
                name: pihole-1pw
          volumeMounts:
            - name: pihole-data
              mountPath: /etc/pihole
            - name: local-dns-config
              mountPath: /etc/dnsmasq.d
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "dig +time=2 +tries=1 pi.hole @127.0.0.1 | grep -q NOERROR"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 20m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: pihole-data
          persistentVolumeClaim:
            claimName: pihole-data
        - name: local-dns-config
          configMap:
            name: pihole-local-dns
