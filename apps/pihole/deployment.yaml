apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
  labels:
    app: pihole
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pihole
  template:
    metadata:
      labels:
        app: pihole
    spec:
      containers:
        - name: pihole
          image: pihole/pihole:2026.04.0
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: TZ
              value: "America/Chicago"
            - name: PIHOLE_DNS_1
              value: "1.1.1.1"
            - name: PIHOLE_DNS_2
              value: "8.8.8.8"
            - name: DNSMASQ_LISTENING
              value: "all"
            - name: VIRTUAL_HOST
              value: "pihole.x.pmcd.io"
          envFrom:
            - secretRef:
                name: pihole-1pw
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    # Poll POST /api/auth until we get a valid session token.
                    # Using the auth endpoint itself avoids unauthenticated hits that
                    # generate "Authentication required" log spam.
                    TOKEN=""
                    i=0
                    while [ -z "$TOKEN" ] && [ $i -lt 60 ]; do
                      sleep 2
                      i=$((i+1))
                      RESPONSE=$(curl -sf -X POST http://localhost/api/auth \
                        -H "Content-Type: application/json" \
                        -d "{\"password\":\"${WEBPASSWORD}\"}" 2>/dev/null)
                      TOKEN=$(echo "$RESPONSE" | grep -o '"sid":"[^"]*"' | cut -d'"' -f4)
                    done
                    [ -z "$TOKEN" ] && exit 0

                    # Skip if adlists are already seeded
                    COUNT=$(curl -sf "http://localhost/api/lists?type=block" \
                      -H "X-FTL-SID: $TOKEN" 2>/dev/null | grep -c '"address"' || echo 0)
                    [ "$COUNT" -gt "0" ] && exit 0

                    # Add each adlist; duplicates return 4xx which are silently ignored
                    while IFS= read -r url; do
                      case "$url" in '#'*|''|' '*) continue ;; esac
                      curl -sf -X POST http://localhost/api/lists \
                        -H "X-FTL-SID: $TOKEN" \
                        -H "Content-Type: application/json" \
                        -d "{\"address\":\"${url}\",\"type\":\"block\",\"comment\":\"seeded-from-k8s\",\"enabled\":true,\"groups\":[0]}" \
                        > /dev/null 2>&1 || true
                    done < /adlists-config/adlists.list

                    # Trigger gravity update to compile the new lists
                    curl -sf -X POST http://localhost/api/action/gravity \
                      -H "X-FTL-SID: $TOKEN" > /dev/null 2>&1 || true
          volumeMounts:
            - name: pihole-data
              mountPath: /etc/pihole
            - name: pihole-dnsmasq
              mountPath: /etc/dnsmasq.d
            - name: adlists-config
              mountPath: /adlists-config
              readOnly: true
          readinessProbe:
            httpGet:
              path: /admin/
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 20m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: pihole-data
          persistentVolumeClaim:
            claimName: pihole-data
        - name: pihole-dnsmasq
          persistentVolumeClaim:
            claimName: pihole-dnsmasq
        - name: adlists-config
          configMap:
            name: pihole-adlists
