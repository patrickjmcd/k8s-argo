apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wyoming-whisper-data
  namespace: voice-assistant
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      # 5Gi covers base (~150MB) and small (~500MB) models plus cache.
      # Increase to 10Gi if you plan to run medium or large models for P25 transcription.
      storage: 5Gi
