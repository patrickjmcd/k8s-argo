apiVersion: apps/v1
kind: Deployment
metadata:
  name: wyoming-whisper
  namespace: voice-assistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wyoming-whisper
  template:
    metadata:
      labels:
        app: wyoming-whisper
    spec:
      containers:
        - name: wyoming-whisper
          image: rhasspy/wyoming-whisper:3.3.1
          args:
            - --uri
            - tcp://0.0.0.0:10300
            - --model
            - base-int8
            - --language
            - en
            - --device
            - cpu
            - --compute-type
            - int8
            - --data-dir
            - /data
            - --download-dir
            - /data
          ports:
            - name: wyoming
              containerPort: 10300
              protocol: TCP
          resources:
            requests:
              cpu: 15m
              memory: 488Mi
            limits:
              cpu: 15m
              memory: 549Mi
          volumeMounts:
            - name: data
              mountPath: /data
          # First run downloads the model — allow up to 5 minutes before declaring failure.
          startupProbe:
            tcpSocket:
              port: 10300
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 10300
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        # jetson-nano-kube0 cannot attach Longhorn volumes (see CLAUDE.md) -
        # use hostPath like wyoming-piper/wyoming-openwakeword.
        - name: data
          hostPath:
            path: /var/lib/wyoming/whisper
            type: DirectoryOrCreate
