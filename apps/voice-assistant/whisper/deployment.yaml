apiVersion: apps/v1
kind: Deployment
metadata:
  name: wyoming-whisper
  namespace: voice-assistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wyoming-whisper
  template:
    metadata:
      labels:
        app: wyoming-whisper
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        nvidia.com/gpu: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - effect: NoExecute
          key: node.kubernetes.io/not-ready
          operator: Exists
          tolerationSeconds: 30
        - effect: NoExecute
          key: node.kubernetes.io/unreachable
          operator: Exists
          tolerationSeconds: 30
      containers:
        - name: wyoming-whisper
          # Jetson-native build (L4T R36.4.x) with CUDA support - the official
          # rhasspy/wyoming-whisper image has no arm64/CUDA variant. Requires
          # the nvidia RuntimeClass (see apps/nvidia-runtime-config).
          image: dustynv/wyoming-whisper:2.3.0-r36.4.0
          env:
            - name: WHISPER_PORT
              value: "10300"
            - name: WHISPER_MODEL
              value: "base-int8"
            - name: WHISPER_LANGUAGE
              value: "en"
          ports:
            - name: wyoming
              containerPort: 10300
              protocol: TCP
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              memory: 3Gi
          volumeMounts:
            - name: data
              mountPath: /data
          # First run downloads the model — allow up to 5 minutes before declaring failure.
          startupProbe:
            tcpSocket:
              port: 10300
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 10300
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        # jetson-nano-kube0 cannot attach Longhorn volumes (see CLAUDE.md) -
        # use hostPath like wyoming-piper/wyoming-openwakeword.
        - name: data
          hostPath:
            path: /var/lib/wyoming/whisper
            type: DirectoryOrCreate
