image:
  repository: docker.n8n.io/n8nio/n8n
  tag: "2.29.0"

service:
  port: 80
  containerPort: 5678

resources:
  requests:
    cpu: 15m
    memory: 561Mi
  limits:
    memory: 611Mi

probes:
  readiness:
    type: tcpSocket
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
  liveness:
    enabled: true
    type: tcpSocket
    initialDelaySeconds: 180
    failureThreshold: 5
    periodSeconds: 10
    timeoutSeconds: 10
  startup:
    enabled: true
    type: tcpSocket
    failureThreshold: 30
    periodSeconds: 5

httproute:
  enabled: true
  hostnames:
    - n8n.x.pmcd.io

persistence:
  enabled: true
  type: smb
  size: 500Mi
  mountPath: /data
  accessMode: ReadWriteMany
  smb:
    source: "//192.168.1.253/AppConfig/n8n"
    volumeHandle: media-smb-n8n-volume-id

onePassword:
  enabled: true
  itemPath: "vaults/Kubernetes/items/n8n"

env:
  GENERIC_TIMEZONE: America/Chicago
  N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
  WEBHOOK_URL: https://n8n.pmcd.dev
  N8N_PROXY_HOPS: "1"
  N8N_PORT: "5678"
  DB_TYPE: postgresdb
  DB_POSTGRESDB_DATABASE: n8n
  DB_POSTGRESDB_USER: n8n
  DB_POSTGRESDB_PORT: "5432"
  DB_POSTGRESDB_SCHEMA: public
  DB_POSTGRESDB_HOST: shared-postgres-rw.postgres.svc.cluster.local

envFrom:
  - secretRef:
      name: n8n-1pw
