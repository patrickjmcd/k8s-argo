---
# Deployment for Frigate with Init Container
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frigate
  labels:
    app: frigate
spec:
  replicas: 1
  strategy:
    type: Recreate  # Important for device access
  selector:
    matchLabels:
      app: frigate
  template:
    metadata:
      labels:
        app: frigate
    spec:
      # Node selector to ensure pod runs on node with Coral TPU
      nodeSelector:
        coral-tpu: "true"

      # Init container to seed config from ConfigMap to Longhorn volume
      initContainers:
        - name: config-init
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              # Check if config exists AND is not empty
              if [ ! -f /config-storage/config.yml ] || [ ! -s /config-storage/config.yml ]; then
                echo "Config missing or empty, copying from ConfigMap..."
                cp /config-seed/config.yml /config-storage/config.yml
                echo "Config copied successfully"
                echo "Config size: $(wc -c < /config-storage/config.yml) bytes"
              else
                echo "Config exists and is valid ($(wc -c < /config-storage/config.yml) bytes), skipping..."
              fi
          volumeMounts:
            - name: config-seed
              mountPath: /config-seed
              readOnly: true
            - name: config-storage
              mountPath: /config-storage
      hostNetwork: true
      containers:
        - name: frigate
          image: frigate
          imagePullPolicy: Always

          # Security context for device access
          securityContext:
            privileged: true  # Required for USB device access



          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
            - name: rtsp
              containerPort: 8554
              protocol: TCP
            - name: webrtc-tcp
              containerPort: 8555
              protocol: TCP
            - name: webrtc-udp
              containerPort: 8555
              protocol: UDP

          env:
            - name: TZ
              value: "America/Chicago"
          envFrom:
            - secretRef:
                name: frigate-1pw

          volumeMounts:
            # Config now lives entirely on Longhorn volume
            - name: config-storage
              mountPath: /config

            # Database on Longhorn (replicated, backed up)
            - name: database
              mountPath: /media/frigate
              subPath: db

            # Recordings on local-path (fast, large)
            - name: recordings
              mountPath: /media/frigate/recordings

            # Clips/snapshots on local-path (fast)
            - name: clips
              mountPath: /media/frigate/clips

            # Exports on local-path (fast)
            - name: exports
              mountPath: /media/frigate/exports

            # Temp cache in memory
            - name: cache
              mountPath: /tmp/cache

            # USB device for Coral TPU
            - name: dev-bus-usb
              mountPath: /dev/bus/usb

          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"

          livenessProbe:
            httpGet:
              path: /api/version
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10

          readinessProbe:
            httpGet:
              path: /api/version
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10

      volumes:
        # ConfigMap used ONLY by init container to seed config
        - name: config-seed
          configMap:
            name: frigate-config

        # Longhorn PVC for config (writable, persistent)
        # After init, this is the source of truth
        - name: config-storage
          persistentVolumeClaim:
            claimName: frigate-config

        # Longhorn PVC for SQLite database (replicated)
        - name: database
          persistentVolumeClaim:
            claimName: frigate-db

        # Local PVC for recordings (fast, large)
        - name: recordings
          persistentVolumeClaim:
            claimName: frigate-recordings

        # Local PVC for clips/snapshots
        - name: clips
          persistentVolumeClaim:
            claimName: frigate-clips

        # Local PVC for exports
        - name: exports
          persistentVolumeClaim:
            claimName: frigate-exports

        # Memory cache
        - name: cache
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi

        # Host USB device
        - name: dev-bus-usb
          hostPath:
            path: /dev/bus/usb
            type: Directory