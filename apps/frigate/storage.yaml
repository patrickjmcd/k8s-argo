# PVC for config storage (writable for zones, etc.)
# Uses Longhorn for replication
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frigate-config
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi

# PVC for SQLite database
# Uses Longhorn for replication and backup
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frigate-db
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: frigate-recordings-pv
spec:
  capacity:
    storage: 100Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage-frigate-recordings
  local:
    path: /opt/frigate/recordings
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - pi5-kube1
# PVC for recordings (large files)
# Uses local-storage for speed, no replication needed
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frigate-recordings
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage-frigate-recordings
  resources:
    requests:
      storage: 100Gi
