apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - cronjob.yaml
  - storage.yaml
  - onepassword.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: kometa-config-template
    files:
      - config.template.yml
      - custom-collections.yml

images:
  - name: kometa
    newName: registry.gitlab.com/linuxserver.io/docker-kometa/kometa
    newTag: 2.4.4
  - name: alpine
    newName: alpine
    newTag: "3.24"
