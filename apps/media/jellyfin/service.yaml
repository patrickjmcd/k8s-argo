apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: media
spec:
  clusterIP: None
  ports:
    - name: http
      port: 8096
      protocol: TCP
      targetPort: 8096
  type: ClusterIP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: jellyfin
  namespace: media
subsets:
  - addresses:
      - ip: 192.168.1.210
    ports:
      - name: http
        port: 8096
        protocol: TCP
