image:
  repository: ghcr.io/pennydreadful/bookshelf
  tag: "softcover-v0.4.20.107"

service:
  port: 80
  containerPort: 8787

resources:
  requests:
    cpu: 15m
    memory: 160Mi
  limits:
    cpu: 500m
    memory: 384Mi

probes:
  readiness:
    type: tcpSocket
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
  liveness:
    enabled: true
    type: tcpSocket
    initialDelaySeconds: 60
    failureThreshold: 5
    periodSeconds: 10
    timeoutSeconds: 10
  startup:
    enabled: true
    type: tcpSocket
    failureThreshold: 30
    periodSeconds: 5

httproute:
  enabled: true
  hostnames:
    - readarr.x.pmcd.io

onePassword:
  enabled: true
  itemPath: "vaults/Kubernetes/items/readarr"

envFrom:
  - secretRef:
      name: readarr-1pw

env:
  TZ: America/Chicago
  READARR__SERVER__PORT: "8787"
  READARR__SERVER__BINDADDRESS: "*"
  READARR__LOG__LEVEL: info
  READARR__AUTH__METHOD: External
  READARR__AUTH__REQUIRED: DisabledForLocalAddresses
  READARR__APP__BRANCH: master
  READARR__APP__LAUNCHBROWSER: "False"
  READARR__APP__UPDATEMECHANISM: Docker
  READARR__APP__INSTANCENAME: readarr
  READARR__POSTGRES__USER: readarr
  READARR__POSTGRES__PORT: "5432"
  READARR__POSTGRES__HOST: 192.168.1.11
  READARR__POSTGRES__MAINDB: readarr-main
  READARR__POSTGRES__LOGDB: readarr-logs

extraVolumes:
  - name: media
    persistentVolumeClaim:
      claimName: smb-media-claim
  - name: downloads
    persistentVolumeClaim:
      claimName: sab-downloads-pvc

extraVolumeMounts:
  - mountPath: /mnt/media
    name: media
  - mountPath: /mnt/downloads
    name: downloads
