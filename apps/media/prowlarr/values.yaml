image:
  repository: linuxserver/prowlarr
  tag: "2.3.0"

service:
  port: 80
  containerPort: 9696

resources:
  requests:
    cpu: 15m
    memory: 200Mi
  limits:
    cpu: 1000m
    memory: 1024Mi

probes:
  readiness:
    type: tcpSocket
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
  liveness:
    enabled: true
    type: tcpSocket
    initialDelaySeconds: 60
    failureThreshold: 5
    periodSeconds: 10
    timeoutSeconds: 10
  startup:
    enabled: true
    type: tcpSocket
    failureThreshold: 30
    periodSeconds: 5

httproute:
  enabled: true
  hostnames:
    - prowlarr.x.pmcd.io

onePassword:
  enabled: true
  itemPath: "vaults/Kubernetes/items/prowlarr"

envFrom:
  - secretRef:
      name: prowlarr-1pw

env:
  TZ: America/Chicago
  PROWLARR__SERVER__PORT: "9696"
  PROWLARR__SERVER__BINDADDRESS: "*"
  PROWLARR__LOG__LEVEL: info
  PROWLARR__AUTH__METHOD: Forms
  PROWLARR__AUTH__REQUIRED: DisabledForLocalAddresses
  PROWLARR__APP__BRANCH: master
  PROWLARR__APP__LAUNCHBROWSER: "False"
  PROWLARR__APP__UPDATEMECHANISM: Docker
  PROWLARR__APP__INSTANCENAME: Prowlarr
  PROWLARR__POSTGRES__USER: prowlarr
  PROWLARR__POSTGRES__PORT: "5432"
  PROWLARR__POSTGRES__HOST: 192.168.4.11
  PROWLARR__POSTGRES__MAINDB: prowlarr-main
  PROWLARR__POSTGRES__LOGDB: prowlarr-logs

extraVolumes:
  - name: media
    persistentVolumeClaim:
      claimName: smb-media-claim

extraVolumeMounts:
  - mountPath: /media
    name: media
