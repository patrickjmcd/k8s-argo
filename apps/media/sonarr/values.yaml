image:
  repository: linuxserver/sonarr
  tag: "4.0.17"

service:
  port: 80
  containerPort: 8989

resources:
  requests:
    cpu: 15m
    memory: 248Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  readiness:
    type: tcpSocket
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
  liveness:
    enabled: true
    type: tcpSocket
    initialDelaySeconds: 60
    failureThreshold: 5
    periodSeconds: 10
    timeoutSeconds: 10
  startup:
    enabled: true
    type: tcpSocket
    failureThreshold: 30
    periodSeconds: 5

httproute:
  enabled: true
  hostnames:
    - sonarr.x.pmcd.io

onePassword:
  enabled: true
  itemPath: "vaults/Kubernetes/items/sonarr"

envFrom:
  - secretRef:
      name: sonarr-1pw

env:
  TZ: America/Chicago
  SONARR__SERVER__PORT: "8989"
  SONARR__SERVER__BINDADDRESS: "*"
  SONARR__LOG__LEVEL: Info
  SONARR__AUTH__METHOD: External
  SONARR__AUTH__REQUIRED: DisabledForLocalAddresses
  SONARR__APP__BRANCH: main
  SONARR__APP__LAUNCHBROWSER: "False"
  SONARR__APP__UPDATEMECHANISM: Docker
  SONARR__APP__INSTANCENAME: Sonarr
  SONARR__POSTGRES__USER: sonarr
  SONARR__POSTGRES__PORT: "5432"
  SONARR__POSTGRES__HOST: 192.168.4.11
  SONARR__POSTGRES__MAINDB: sonarr-main
  SONARR__POSTGRES__LOGDB: sonarr-logs

extraVolumes:
  - name: media
    persistentVolumeClaim:
      claimName: smb-media-claim
  - name: downloads
    persistentVolumeClaim:
      claimName: sab-downloads-pvc

extraVolumeMounts:
  - mountPath: /mnt/media
    name: media
  - mountPath: /mnt/downloads
    name: downloads
