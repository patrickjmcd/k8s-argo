apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - service.yaml
  - httproute.yaml
  - 1password.secret.yaml

configMapGenerator:
  - name: sabnzbd-template
    files:
      - sabnzbd.template.ini

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: sabnzbd
    newName: linuxserver/sabnzbd
    newTag: 4.5.5
