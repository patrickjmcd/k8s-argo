image:
  repository: linuxserver/radarr
  tag: "6.1.1"

service:
  port: 80
  containerPort: 7878

resources:
  requests:
    cpu: 15m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 768Mi

probes:
  readiness:
    type: tcpSocket
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
  liveness:
    enabled: true
    type: tcpSocket
    initialDelaySeconds: 60
    failureThreshold: 5
    periodSeconds: 10
    timeoutSeconds: 10
  startup:
    enabled: true
    type: tcpSocket
    failureThreshold: 30
    periodSeconds: 5

httproute:
  enabled: true
  hostnames:
    - radarr.x.pmcd.io

onePassword:
  enabled: true
  itemPath: "vaults/Kubernetes/items/radarr"

envFrom:
  - secretRef:
      name: radarr-1pw

env:
  TZ: America/Chicago
  RADARR__SERVER__PORT: "7878"
  RADARR__SERVER__BINDADDRESS: "*"
  RADARR__LOG__LEVEL: info
  RADARR__AUTH__METHOD: External
  RADARR__AUTH__REQUIRED: DisabledForLocalAddresses
  RADARR__APP__BRANCH: master
  RADARR__APP__LAUNCHBROWSER: "False"
  RADARR__APP__UPDATEMECHANISM: Docker
  RADARR__APP__INSTANCENAME: Radarr
  RADARR__POSTGRES__USER: radarr
  RADARR__POSTGRES__PORT: "5432"
  RADARR__POSTGRES__HOST: 192.168.4.11
  RADARR__POSTGRES__MAINDB: radarr-main
  RADARR__POSTGRES__LOGDB: radarr-logs

extraVolumes:
  - name: media
    persistentVolumeClaim:
      claimName: smb-media-claim
  - name: downloads
    persistentVolumeClaim:
      claimName: sab-downloads-pvc

extraVolumeMounts:
  - mountPath: /mnt/media
    name: media
  - mountPath: /mnt/downloads
    name: downloads
