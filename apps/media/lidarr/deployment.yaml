apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: lidarr
    app.kubernetes.io/name: lidarr
  name: lidarr
  namespace: media
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: lidarr
      app.kubernetes.io/name: lidarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: lidarr
        app.kubernetes.io/name: lidarr
    spec:
      containers:
        - name: lidarr
          envFrom:
            - secretRef:
                name: lidarr-1pw
          env:
            - name: TZ
              value: America/Chicago
            - name: LIDARR__SERVER__PORT
              value: "8686"
            - name: LIDARR__SERVER__BINDADDRESS
              value: "*"
            - name: LIDARR__LOG__LEVEL
              value: info
            - name: LIDARR__AUTH__METHOD
              value: External
            - name: LIDARR__AUTH__REQUIRED
              value: DisabledForLocalAddresses
            - name: LIDARR__APP__BRANCH
              value: master
            - name: LIDARR__APP__LAUNCHBROWSER
              value: "False"
            - name: LIDARR__APP__UPDATEMECHANISM
              value: Docker
            - name: LIDARR__APP__INSTANCENAME
              value: Lidarr
            - name: LIDARR__POSTGRES__USER
              value: lidarr
            - name: LIDARR__POSTGRES__PORT
              value: "5432"
            - name: LIDARR__POSTGRES__HOST
              value: 192.168.4.11
            - name: LIDARR__POSTGRES__MAINDB
              value: lidarr-main
            - name: LIDARR__POSTGRES__LOGDB
              value: lidarr-logs

          image: lidarr
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8686
              name: http
              protocol: TCP

          readinessProbe:
            failureThreshold: 3
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: http
            timeoutSeconds: 1

          livenessProbe:
            failureThreshold: 5
            initialDelaySeconds: 60
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: http
            timeoutSeconds: 10

          startupProbe:
            failureThreshold: 30
            periodSeconds: 5
            successThreshold: 1
            tcpSocket:
              port: http
            timeoutSeconds: 1

          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 15m
              memory: 768Mi

          volumeMounts:
            - mountPath: /mnt/media
              name: media
            - mountPath: /mnt/downloads
              name: downloads

      restartPolicy: Always
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: smb-media-claim
        - name: downloads
          persistentVolumeClaim:
            claimName: sab-downloads-pvc
