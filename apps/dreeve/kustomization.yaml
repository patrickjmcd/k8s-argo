apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - service.yaml
  - httproute.yaml
  - storage.yaml
  - 1password.secret.yaml

images:
  - name: dreeve
    newName: ghcr.io/dreeveapp/dreeve
    newTag: "v5.0.2"

configMapGenerator:
  - name: dreeve-config
    literals:
      - IMPORT_MODE=stravaApi
      - APP_URL=https://strava.x.pmcd.io
      - TZ=America/Chicago
      # Deliberately NOT setting PROXY_HOST/PROXY_PORT. Those drive a second
      # Caddy server block ({$PROXY_HOST}:{$PROXY_PORT}) that reverse-proxies
      # to localhost:8080 - meant for when Caddy is the public-facing proxy.
      # Here traefik terminates TLS and forwards to the pod on 8080, which the
      # default ":8080" block already serves. Setting them either breaks Caddy
      # parsing (https + non-443 port) or creates a proxy loop. APP_URL alone
      # tells the app its public origin.
