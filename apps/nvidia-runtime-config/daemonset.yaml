apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-runtime-configurator
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: nvidia-runtime-configurator
  template:
    metadata:
      labels:
        app: nvidia-runtime-configurator
    spec:
      nodeSelector:
        nvidia.com/gpu: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      hostPID: true
      initContainers:
        - name: configure-nvidia-runtime
          image: debian:bookworm-slim
          securityContext:
            privileged: true # security-agent: ignore
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              # k3s regenerates config.toml from config.toml.tmpl on every
              # start, so the persistent template - not the generated file -
              # is what must be edited.
              CONTAINERD_TMPL=/host/var/lib/rancher/k3s/agent/etc/containerd/config.toml.tmpl

              # containerd 2.x renamed the CRI plugin ID from
              # io.containerd.grpc.v1.cri (1.x) to io.containerd.cri.v1.runtime.
              # `nvidia-ctk runtime configure` (as of v1.16.2) always emits the
              # old 1.x schema regardless of the actual containerd version, so
              # its output is silently ignored on containerd 2.x - write the
              # correct schema directly instead of relying on it.
              #
              # SystemdCgroup must be false here: this node's kubelet passes
              # cgroupfs-style paths, and nvidia-container-runtime fails
              # sandbox creation ("expected cgroupsPath to be of format
              # slice:prefix:name") if SystemdCgroup=true, even though the
              # plain runc handler on the same node uses SystemdCgroup=true
              # without issue. Deliberately NOT setting default_runtime_name:
              # doing so previously forced every pod on the node (including
              # kyverno's controllers) through nvidia-container-runtime and
              # broke them. nvidia must stay opt-in via RuntimeClass only.
              if grep -q 'io.containerd.cri.v1.runtime".containerd.runtimes.nvidia' "${CONTAINERD_TMPL}" 2>/dev/null; then
                echo "NVIDIA runtime already configured, skipping"
                exit 0
              fi

              echo "Configuring NVIDIA container runtime for k3s (containerd 2.x schema)..."
              # host-root is mounted read-only, so write via nsenter into the
              # host's own namespace rather than through the /host bind mount.
              cat <<'TOML' | nsenter -t 1 -m -u -i -n -p -- tee /var/lib/rancher/k3s/agent/etc/containerd/config.toml.tmpl > /dev/null
              version = 3

              [plugins."io.containerd.cri.v1.runtime".containerd.runtimes.nvidia]
                runtime_type = "io.containerd.runc.v2"

              [plugins."io.containerd.cri.v1.runtime".containerd.runtimes.nvidia.options]
                BinaryName = "/usr/bin/nvidia-container-runtime"
                SystemdCgroup = false
              TOML

              echo "Restarting k3s-agent..."
              nsenter -t 1 -m -u -i -n -p -- \
                systemctl restart k3s-agent || \
              nsenter -t 1 -m -u -i -n -p -- \
                systemctl restart k3s

              echo "Done"
          volumeMounts:
            - name: host-root
              mountPath: /host
              readOnly: true
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
      volumes:
        - name: host-root
          hostPath:
            path: /
