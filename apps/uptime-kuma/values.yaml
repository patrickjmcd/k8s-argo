image:
  repository: louislam/uptime-kuma
  tag: "2.4.0"

service:
  port: 3001

resources:
  requests:
    cpu: 50m
    memory: 288Mi
  limits:
    # cpu deliberately unset so it inherits the chart default (500m). The old 49m
    # limit was 4.9ms per 100ms CFS period and throttled 17.6% of periods against
    # uptime-kuma's bursty monitor checks; 500m gives a 50ms quota with plenty of
    # headroom while still capping a runaway.
    memory: 384Mi

probes:
  readiness:
    type: httpGet
    path: /
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  liveness:
    enabled: false
  startup:
    enabled: false

httproute:
  enabled: true
  hostnames:
    - status.x.pmcd.io
    - uptime-kuma.x.pmcd.io

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: DoesNotExist

persistence:
  enabled: true
  type: longhorn
  size: 1Gi
  mountPath: /app/data
  labels:
    recurring-job-group.longhorn.io/b2-backup: enabled

serviceMonitor:
  enabled: true
  path: /metrics
  basicAuth:
    enabled: true
    secretName: uptime-kuma-1pw
    usernameKey: username
    passwordKey: password
