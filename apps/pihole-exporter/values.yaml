image:
  repository: ekofr/pihole-exporter
  tag: "v0.4.0"

service:
  port: 9617
  portName: http

httproute:
  enabled: false

probes:
  readiness:
    type: httpGet
    path: /metrics
    port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  liveness:
    enabled: true
    type: httpGet
    path: /metrics
    port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  startup:
    type: httpGet
    path: /metrics
    port: http
    failureThreshold: 12
    periodSeconds: 5

serviceMonitor:
  enabled: true
  path: /metrics
  port: http

env:
  PIHOLE_HOSTNAME: pihole-web
  PIHOLE_PORT: "80"
  PORT: "9617"

onePassword:
  enabled: true
  itemPath: vaults/Kubernetes/items/pihole-exporter

envFrom:
  - secretRef:
      name: pihole-exporter-1pw

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 64Mi
