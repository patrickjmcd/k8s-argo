apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pve-exporter
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/manifest-generate-paths: .
spec:
  destination:
    namespace: prometheus
    name: in-cluster
  project: core-components
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  sources:
    - repoURL: https://github.com/patrickjmcd/k8s-argo.git
      targetRevision: main
      ref: values
    - path: charts/homelab-app
      repoURL: https://github.com/patrickjmcd/k8s-argo.git
      targetRevision: main
      helm:
        releaseName: pve-exporter
        valueFiles:
          - $values/apps/pve-exporter/values.yaml
