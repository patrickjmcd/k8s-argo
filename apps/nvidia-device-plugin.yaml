apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nvidia-device-plugin
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/manifest-generate-paths: .
spec:
  destination:
    namespace: kube-system
    name: in-cluster
  project: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  sources:
    - chart: nvidia-device-plugin
      repoURL: https://nvidia.github.io/k8s-device-plugin
      targetRevision: 0.19.0
      helm:
        valuesObject:
          nodeSelector:
            nvidia.com/gpu: "true"
          tolerations:
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule
          config:
            map:
              default: |-
                version: v1
                flags:
                  migStrategy: none
                  failOnInitError: true
                  nvidiaDriverRoot: /
                  deviceDiscoveryStrategy: tegra
                  gdsEnabled: false
                  mofedEnabled: false
                  gdrcopyEnabled: false
