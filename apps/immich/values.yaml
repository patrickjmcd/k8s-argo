controllers:
  main:
    containers:
      main:
        image:
          # renovate: depName=ghcr.io/immich-app/immich-server
          tag: v3.0.3
        env:
          DB_HOSTNAME: "postgres-rw"
          DB_DATABASE_NAME: "app"
          REDIS_HOSTNAME: "immich-redis"
        envFrom:
          - secretRef:
              name: immich-1pw

immich:
  persistence:
    library:
      existingClaim: immich-library

server:
  enabled: true
  defaultPodOptions:
    nodeSelector:
      node-type: heavy
    tolerations:
      - key: dedicated
        operator: Equal
        value: heavy
        effect: NoSchedule
      # declared explicitly so the kyverno node-failure-tolerations mutation
      # (which replaces the whole list) skips these pods
      - key: node.kubernetes.io/not-ready
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 30
      - key: node.kubernetes.io/unreachable
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 30
  controllers:
    main:
      containers:
        main:
          probes:
            liveness:
              spec:
                timeoutSeconds: 10
                failureThreshold: 10
            readiness:
              spec:
                timeoutSeconds: 10
                failureThreshold: 10
          resources:
            requests:
              cpu: 100m
              memory: 1500Mi
            limits:
              memory: 4Gi

machine-learning:
  enabled: true
  defaultPodOptions:
    nodeSelector:
      node-type: heavy
    tolerations:
      - key: dedicated
        operator: Equal
        value: heavy
        effect: NoSchedule
      # declared explicitly so the kyverno node-failure-tolerations mutation
      # (which replaces the whole list) skips these pods
      - key: node.kubernetes.io/not-ready
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 30
      - key: node.kubernetes.io/unreachable
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 30
  controllers:
    main:
      containers:
        main:
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              memory: 4Gi
  persistence:
    cache:
      enabled: true
      size: 10Gi
      # Longhorn can't attach on the tainted media-server node (no longhorn
      # daemonset there); NFS from the UNAS works on every node.
      storageClass: nfs-csi
      accessMode: ReadWriteOnce
