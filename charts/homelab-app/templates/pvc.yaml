{{- if and .Values.persistence.enabled (eq .Values.persistence.type "longhorn") }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: longhorn-{{ .Release.Name }}-data
  {{- with .Values.persistence.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  storageClassName: longhorn
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
{{- end }}
